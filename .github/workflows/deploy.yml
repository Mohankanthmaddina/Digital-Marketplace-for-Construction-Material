name: Deploy Ecom to EC2
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'corretto'
    - name: Build JAR
      run: mvn clean package -DskipTests
    - name: Rename JAR
      run: find target -name "*.jar" -not -name "*.original" | head -1 | xargs -I {} mv {} target/ecom.jar
    - name: Copy JAR to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "target/ecom.jar"
        target: "/home/ec2-user/"
        strip_components: 1
    - name: Deploy on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: DB_URL,DB_USERNAME,DB_PASSWORD,RAZORPAY_KEY,RAZORPAY_SECRET,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,GEMINI_API_KEY,API_DOCS_PATH,SWAGGER_UI_PATH,SWAGGER_TAG_SORTER,SWAGGER_OPERATION_SORTER
        script: |
          cat > /tmp/ecom.service << EOF
          [Unit]
          Description=Ecom Spring Boot App
          After=network.target
          [Service]
          User=ec2-user
          WorkingDirectory=/home/ec2-user
          Environment="DB_URL=${DB_URL}"
          Environment="DB_USERNAME=${DB_USERNAME}"
          Environment="DB_PASSWORD=${DB_PASSWORD}"
          Environment="RAZORPAY_KEY=${RAZORPAY_KEY}"
          Environment="RAZORPAY_SECRET=${RAZORPAY_SECRET}"
          Environment="MAIL_HOST=${MAIL_HOST}"
          Environment="MAIL_PORT=${MAIL_PORT}"
          Environment="MAIL_USERNAME=${MAIL_USERNAME}"
          Environment="MAIL_PASSWORD=${MAIL_PASSWORD}"
          Environment="GEMINI_API_KEY=${GEMINI_API_KEY}"
          Environment="API_DOCS_PATH=${API_DOCS_PATH}"
          Environment="SWAGGER_UI_PATH=${SWAGGER_UI_PATH}"
          Environment="SWAGGER_TAG_SORTER=${SWAGGER_TAG_SORTER}"
          Environment="SWAGGER_OPERATION_SORTER=${SWAGGER_OPERATION_SORTER}"
          ExecStart=/usr/bin/java -jar /home/ec2-user/ecom.jar
          SuccessExitStatus=143
          Restart=always
          RestartSec=10
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo mv /tmp/ecom.service /etc/systemd/system/ecom.service
          sudo systemctl daemon-reload
          sudo systemctl enable ecom
          sudo systemctl restart ecom
          sudo systemctl status ecom
      env:
        DB_URL: ${{ secrets.DB_URL }}
        DB_USERNAME: ${{ secrets.DB_USERNAME }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        RAZORPAY_KEY: ${{ secrets.RAZORPAY_KEY }}
        RAZORPAY_SECRET: ${{ secrets.RAZORPAY_SECRET }}
        MAIL_HOST: ${{ secrets.MAIL_HOST }}
        MAIL_PORT: ${{ secrets.MAIL_PORT }}
        MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        API_DOCS_PATH: ${{ secrets.API_DOCS_PATH }}
        SWAGGER_UI_PATH: ${{ secrets.SWAGGER_UI_PATH }}
        SWAGGER_TAG_SORTER: ${{ secrets.SWAGGER_TAG_SORTER }}
        SWAGGER_OPERATION_SORTER: ${{ secrets.SWAGGER_OPERATION_SORTER }}