<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BuildPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Inline Professional Alerts CSS - Same as Login Page */
        .alert-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            max-width: 400px;
            width: 100%;
            pointer-events: none;
        }

        .professional-alert {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            margin-bottom: 16px;
            padding: 0;
            overflow: hidden;
            pointer-events: auto;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-left: 4px solid;
            position: relative;
        }

        .professional-alert.show {
            transform: translateX(0);
            opacity: 1;
        }

        .professional-alert.hide {
            transform: translateX(100%);
            opacity: 0;
        }

        .alert-header {
            padding: 20px 24px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .alert-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            flex: 1;
        }

        .alert-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            color: #6b7280;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
        }

        .alert-close:hover {
            background: #f3f4f6;
            color: #374151;
        }

        .alert-body {
            padding: 0 24px 20px;
            font-size: 14px;
            line-height: 1.5;
            color: #4b5563;
        }

        .alert-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            border-radius: 0 0 12px 12px;
            animation: progressBar 5s linear forwards;
        }

        @keyframes progressBar {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }

        /* Success Alert */
        .alert-success {
            border-left-color: #10b981;
        }

        .alert-success .alert-icon {
            background: #d1fae5;
            color: #065f46;
        }

        .alert-success .alert-title {
            color: #065f46;
        }

        /* Error Alert */
        .alert-error {
            border-left-color: #ef4444;
        }

        .alert-error .alert-icon {
            background: #fee2e2;
            color: #991b1b;
        }

        .alert-error .alert-title {
            color: #991b1b;
        }

        /* Warning Alert */
        .alert-warning {
            border-left-color: #f59e0b;
        }

        .alert-warning .alert-icon {
            background: #fef3c7;
            color: #92400e;
        }

        .alert-warning .alert-title {
            color: #92400e;
        }

        /* Info Alert */
        .alert-info {
            border-left-color: #3b82f6;
        }

        .alert-info .alert-icon {
            background: #dbeafe;
            color: #1e40af;
        }

        .alert-info .alert-title {
            color: #1e40af;
        }

        /* Loading Alert */
        .alert-loading {
            border-left-color: #6b7280;
        }

        .alert-loading .alert-icon {
            background: #f3f4f6;
            color: #374151;
            animation: spin 1s linear infinite;
        }

        .alert-loading .alert-title {
            color: #374151;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            .alert-container {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }
    </style>
</head>

<body class="min-h-screen bg-gray-50">
    <nav class="bg-white shadow-lg py-4">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2 cursor-pointer" onclick="window.location.href='/homepage'">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-hard-hat text-white text-xl"></i>
                    </div>
                    <span class="text-2xl font-bold text-blue-600"></span>
                </div>
                <a href="login" class="text-blue-600 hover:text-blue-800">← Back to Login</a>
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto my-12 bg-white rounded-xl shadow-xl p-8">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Reset Password</h2>
            <p class="text-gray-600">Enter your email to receive OTP</p>
        </div>

        <form onsubmit="event.preventDefault(); sendPasswordResetOTP();">
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Email Address</label>
                <input id="emailInput" type="email"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600"
                    placeholder="Enter your email" required>
            </div>

            <div class="mb-6">
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                    Send OTP
                </button>
            </div>

            <div class="text-center">
                <a href="login" class="text-blue-600 hover:underline">Back to Login</a>
            </div>
        </form>
    </div>

    <script>
        // Inline Professional Alerts System - Same as Login Page
        let alertCounter = 0;
        let alerts = new Map();

        function initAlerts() {
            if (!document.getElementById('alert-container')) {
                const container = document.createElement('div');
                container.id = 'alert-container';
                container.className = 'alert-container';
                document.body.appendChild(container);
            }
        }

        function showAlert(type, message, title, options = {}) {
            const {
                duration = 5000,
                showClose = true,
                persistent = false
            } = options;

            const alertId = `alert-${++alertCounter}`;
            const alert = document.createElement('div');
            alert.id = alertId;
            alert.className = `professional-alert alert-${type}`;

            const icon = getIcon(type);
            const closeButton = showClose ? createCloseButton(alertId) : '';
            const progress = !persistent ? '<div class="alert-progress"></div>' : '';

            alert.innerHTML = `
                <div class="alert-header">
                    <div class="alert-icon">${icon}</div>
                    <h3 class="alert-title">${title}</h3>
                    ${closeButton}
                </div>
                <div class="alert-body">${message}</div>
                ${progress}
            `;

            const container = document.getElementById('alert-container');
            container.appendChild(alert);
            alerts.set(alertId, alert);

            setTimeout(() => {
                alert.classList.add('show');
            }, 10);

            if (!persistent && duration > 0) {
                setTimeout(() => {
                    hideAlert(alertId);
                }, duration);
            }

            return alertId;
        }

        function hideAlert(alertId) {
            const alert = alerts.get(alertId);
            if (alert) {
                alert.classList.add('hide');
                setTimeout(() => {
                    if (alert.parentNode) {
                        alert.parentNode.removeChild(alert);
                    }
                    alerts.delete(alertId);
                }, 300);
            }
        }

        function getIcon(type) {
            const icons = {
                success: '✓',
                error: '✕',
                warning: '⚠',
                info: 'ℹ',
                loading: '⟳'
            };
            return icons[type] || icons.info;
        }

        function createCloseButton(alertId) {
            return `<button class="alert-close" onclick="hideAlert('${alertId}')" aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>`;
        }

        // Alert Functions - Same as Login Page
        function showSuccess(message, title = 'Success') {
            return showAlert('success', message, title);
        }

        function showError(message, title = 'Error') {
            return showAlert('error', message, title);
        }

        function showWarning(message, title = 'Warning') {
            return showAlert('warning', message, title);
        }

        function showInfo(message, title = 'Information') {
            return showAlert('info', message, title);
        }

        async function sendPasswordResetOTP() {
            const email = document.getElementById("emailInput").value;
            if (!email) return;

            try {
                // Call your backend API
                const response = await fetch("/forgot-password?email=" + encodeURIComponent(email), {
                    method: "POST"
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem("resetEmail", data.email);
                    window.location.href = "/otp-verification?type=" + data.type + "&email=" + encodeURIComponent(data.email);
                } else {
                    // Parse error response - backend returns JSON
                    let errorMessage = "Email not found or not verified";
                    try {
                        // Read response as text first (can only read once)
                        const errorText = await response.text();

                        // Try to parse as JSON
                        try {
                            const errorData = JSON.parse(errorText);
                            errorMessage = errorData.error || errorData.message || errorMessage;
                        } catch (parseError) {
                            // If not valid JSON, clean up the text message
                            errorMessage = errorText.replace(/^Error:\s*/, '').replace(/[{}"]/g, '').trim() || errorMessage;
                        }
                    } catch (e) {
                        // Fallback if reading response fails
                        errorMessage = "Email not found or not verified";
                    }

                    // Show beautiful error alert - same theme as login page
                    showError(errorMessage, "Password Reset Failed");
                }
            } catch (error) {
                console.error("Request failed:", error);
                showError("Something went wrong. Please check your connection and try again later.", "Connection Error");
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function () {
            initAlerts();
        });
    </script>
</body>

</html>
