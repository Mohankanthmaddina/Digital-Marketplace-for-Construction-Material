<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="/css/professional-alerts.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification - Buildpro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="min-h-screen bg-gray-50">
  <div id="alert-container"></div>
  <script src="/js/professional-alerts.js"></script>
  <script src="/js/otp-verification.js"></script>
  <nav class="bg-white shadow-lg py-4">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="window.location.href='/homepage'">
          <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
            <i class="fas fa-hard-hat text-white text-xl"></i>
          </div>
          <span class="text-2xl font-bold text-blue-600">BuildPro</span>
        </div>
        <a href="login" class="text-blue-600 hover:text-blue-800">← Back to Login</a>
      </div>
    </div>
  </nav>

  <div class="max-w-md mx-auto my-12 bg-white rounded-xl shadow-xl p-8">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-800">OTP Verification</h2>
      <p class="text-gray-600">Enter the OTP sent to your email</p>
    </div>

    <form onsubmit="event.preventDefault(); resetPassword();">
      <div class="mb-6">
        <label class="block text-gray-700 mb-2">OTP</label>
        <input id="otpInput" type="text" maxlength="6"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600"
          placeholder="Enter 6-digit OTP" required>
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 mb-2">New Password</label>
        <div class="relative">
          <input id="passwordInput" type="password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600"
            placeholder="Enter new password" required>
          <button type="button" onclick="togglePasswordVisibility()"
            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
            <i id="togglePasswordIcon" class="fas fa-eye"></i>
          </button>
        </div>
        <!-- Password Strength Indicator -->
        <div id="password-strength" class="mt-2 hidden">
          <div class="flex items-center gap-2 mb-2">
            <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
              <div id="strength-bar" class="h-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="strength-text" class="text-sm font-medium"></span>
          </div>
        </div>
        <!-- Password Requirements -->
        <div id="password-requirements" class="mt-3 space-y-1 text-sm">
          <div id="req-length" class="flex items-center text-gray-500">
            <i class="fas fa-circle text-xs mr-2"></i>
            <span>At least 8 characters</span>
          </div>
          <div id="req-uppercase" class="flex items-center text-gray-500">
            <i class="fas fa-circle text-xs mr-2"></i>
            <span>One uppercase letter (A-Z)</span>
          </div>
          <div id="req-lowercase" class="flex items-center text-gray-500">
            <i class="fas fa-circle text-xs mr-2"></i>
            <span>One lowercase letter (a-z)</span>
          </div>
          <div id="req-number" class="flex items-center text-gray-500">
            <i class="fas fa-circle text-xs mr-2"></i>
            <span>One number (0-9)</span>
          </div>
          <div id="req-special" class="flex items-center text-gray-500">
            <i class="fas fa-circle text-xs mr-2"></i>
            <span>One special character (@#$%^&*!)</span>
          </div>
        </div>
      </div>

      <div class="mb-6">
        <button type="submit"
          class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
          Reset Password
        </button>
      </div>
    </form>
  </div>

  <script>
    // Password Validation Functions
    function validatePasswordStrength(password) {
      const requirements = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[@#$%^&*!]/.test(password)
      };
      return requirements;
    }

    function getPasswordStrength(password) {
      const requirements = validatePasswordStrength(password);
      const metRequirements = Object.values(requirements).filter(Boolean).length;

      if (metRequirements === 5) return { strength: 'strong', width: 100, color: '#10b981', text: 'Strong' };
      if (metRequirements >= 4) return { strength: 'good', width: 75, color: '#3b82f6', text: 'Good' };
      if (metRequirements >= 3) return { strength: 'fair', width: 50, color: '#f59e0b', text: 'Fair' };
      if (metRequirements >= 1) return { strength: 'weak', width: 25, color: '#ef4444', text: 'Weak' };
      return { strength: 'none', width: 0, color: '#ef4444', text: 'Too Weak' };
    }

    function updatePasswordRequirements(password) {
      const requirements = validatePasswordStrength(password);

      // Update each requirement indicator
      updateRequirement('req-length', requirements.length);
      updateRequirement('req-uppercase', requirements.uppercase);
      updateRequirement('req-lowercase', requirements.lowercase);
      updateRequirement('req-number', requirements.number);
      updateRequirement('req-special', requirements.special);

      // Update strength bar
      const strength = getPasswordStrength(password);
      const strengthBar = document.getElementById('strength-bar');
      const strengthText = document.getElementById('strength-text');
      const passwordStrength = document.getElementById('password-strength');

      if (password.length > 0) {
        passwordStrength.classList.remove('hidden');
        strengthBar.style.width = strength.width + '%';
        strengthBar.style.backgroundColor = strength.color;
        strengthText.textContent = strength.text;
        strengthText.style.color = strength.color;
      } else {
        passwordStrength.classList.add('hidden');
      }
    }

    function updateRequirement(elementId, isMet) {
      const element = document.getElementById(elementId);
      const icon = element.querySelector('i');

      if (isMet) {
        element.classList.remove('text-gray-500');
        element.classList.add('text-green-600');
        icon.classList.remove('fa-circle');
        icon.classList.add('fa-check-circle');
      } else {
        element.classList.remove('text-green-600');
        element.classList.add('text-gray-500');
        icon.classList.remove('fa-check-circle');
        icon.classList.add('fa-circle');
      }
    }

    function togglePasswordVisibility() {
      const input = document.getElementById('passwordInput');
      const icon = document.getElementById('togglePasswordIcon');

      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    function isPasswordStrong(password) {
      const requirements = validatePasswordStrength(password);
      return Object.values(requirements).every(Boolean);
    }

    async function resetPassword() {
      const otpCode = document.getElementById("otpInput").value;
      const newPassword = document.getElementById("passwordInput").value;
      const email = new URLSearchParams(window.location.search).get("email");
      const API_BASE = "/reset-password";

      if (!otpCode || !newPassword) {
        showInfo("Please enter OTP and new password.", "Alert");
        return;
      }

      // Validate password strength
      if (!isPasswordStrong(newPassword)) {
        showError("Password does not meet the strength requirements. Please ensure it has at least 8 characters, uppercase, lowercase, number, and special character.", "Weak Password");
        return;
      }

      try {
        const response = await fetch(API_BASE, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email,
            otpCode,
            newPassword
          })
        });

        const text = await response.text();
        console.log("RAW RESPONSE:", text);  // ⭐ IMPORTANT
        let result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          showError("Server returned invalid JSON", "Error");
          return;
        }

        if (response.ok && result.status === "SUCCESS") {
          showSuccess(result.message, "Success");
          setTimeout(() => { window.location.href = "/login"; }, 1500);
        } else {
          showError(result.message, "Error");
        }

      } catch (err) {
        console.error(err);
        showError("Something went wrong", "Error");
      }

    }

    // Initialize password validation on page load
    document.addEventListener('DOMContentLoaded', function () {
      const passwordInput = document.getElementById('passwordInput');

      passwordInput.addEventListener('input', function () {
        updatePasswordRequirements(this.value);
      });
    });
  </script>
</body>

</html>
