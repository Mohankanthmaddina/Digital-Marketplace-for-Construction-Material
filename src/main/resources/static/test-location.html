<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Feature Test - BuildPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/js/location-service.js"></script>
</head>
<body class="min-h-screen bg-gray-50 p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Location Feature Test</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Test Address Form</h2>
            <p class="text-gray-600 mb-4">Click the "Use My Current Location" button to test the location feature.</p>
            
            <form id="test-address-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
                        <input type="text" id="name" name="name" required 
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required 
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address Line 1 *</label>
                    <input type="text" id="addressLine1" name="addressLine1" required 
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address Line 2</label>
                    <input type="text" id="addressLine2" name="addressLine2" 
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">City *</label>
                        <input type="text" id="city" name="city" required 
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">State *</label>
                        <input type="text" id="state" name="state" required 
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Postal Code *</label>
                        <input type="text" id="postalCode" name="postalCode" required 
                               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Country *</label>
                    <input type="text" id="country" name="country" required 
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" value="India">
                </div>
                
                <div class="flex gap-4 pt-4">
                    <button type="button" id="use-location-btn" 
                            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors flex items-center">
                        <i class="fas fa-map-marker-alt mr-2"></i>
                        Use My Current Location
                    </button>
                    
                    <button type="button" id="clear-form-btn" 
                            class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition-colors flex items-center">
                        <i class="fas fa-eraser mr-2"></i>
                        Clear Form
                    </button>
                </div>
            </form>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Test Results</h2>
            <div id="test-results" class="space-y-2">
                <p class="text-gray-600">No tests run yet. Click "Use My Current Location" to test the feature.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const useLocationBtn = document.getElementById('use-location-btn');
            const clearFormBtn = document.getElementById('clear-form-btn');
            const testResults = document.getElementById('test-results');
            
            // Test location feature
            useLocationBtn.addEventListener('click', function() {
                testResults.innerHTML = '<p class="text-blue-600"><i class="fas fa-spinner fa-spin mr-2"></i>Testing location feature...</p>';
                
                useCurrentLocation('#test-address-form', {
                    onSuccess: function(data) {
                        testResults.innerHTML = `
                            <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                                <h3 class="font-semibold">✅ Test Successful!</h3>
                                <p class="mt-2">Location detected and address filled successfully.</p>
                                <div class="mt-2 text-sm">
                                    <p><strong>Coordinates:</strong> ${data.position.latitude.toFixed(6)}, ${data.position.longitude.toFixed(6)}</p>
                                    <p><strong>Accuracy:</strong> ${data.position.accuracy}m</p>
                                    <p><strong>Address:</strong> ${data.addressDetails.addressLine1}, ${data.addressDetails.city}, ${data.addressDetails.state}</p>
                                </div>
                            </div>
                        `;
                    },
                    onError: function(error) {
                        testResults.innerHTML = `
                            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                                <h3 class="font-semibold">❌ Test Failed</h3>
                                <p class="mt-2">Error: ${error.message}</p>
                                <div class="mt-2 text-sm">
                                    <p><strong>Possible solutions:</strong></p>
                                    <ul class="list-disc list-inside mt-1">
                                        <li>Allow location access in your browser</li>
                                        <li>Make sure you're using HTTPS</li>
                                        <li>Check if location services are enabled</li>
                                        <li>Try refreshing the page</li>
                                    </ul>
                                </div>
                            </div>
                        `;
                    }
                });
            });
            
            // Clear form
            clearFormBtn.addEventListener('click', function() {
                document.getElementById('test-address-form').reset();
                testResults.innerHTML = '<p class="text-gray-600">Form cleared. Ready for next test.</p>';
            });
        });
    </script>
</body>
</html>
